services:
  nlp_api_server:
    build:
      context: .
    image: muidea/magicnlp:latest
    container_name: nlp_api_server
    environment:
      EMBED_MODEL: ${EMBED_MODEL:-intfloat/multilingual-e5-small}
      LOCAL_FILES_ONLY: ${LOCAL_FILES_ONLY:-false}
      EMBED_DEFAULT_INPUT_TYPE: "${EMBED_DEFAULT_INPUT_TYPE:-passage}"
      EMBED_QUERY_PREFIX: "${EMBED_QUERY_PREFIX:-query: }"
      EMBED_PASSAGE_PREFIX: "${EMBED_PASSAGE_PREFIX:-passage: }"
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./cache/huggingface:/root/.cache/huggingface
    command: >
      gunicorn -b 0.0.0.0:8080
      --workers ${GUNICORN_WORKERS:-1}
      --threads ${GUNICORN_THREADS:-4}
      --timeout ${GUNICORN_TIMEOUT:-300}
      embed_server:app
    ports:
      - "${NLP_PORT:-8010}:8080"
    restart: unless-stopped
