services:
  nlp_api_server:
    build:
      context: .
    image: muidea/magicnlp:latest
    container_name: nlp_api_server
    environment:
      EMBED_MODEL: ${EMBED_MODEL:-thenlper/gte-small}
      LOCAL_FILES_ONLY: ${LOCAL_FILES_ONLY:-false}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    command: >
      gunicorn -b 0.0.0.0:8080
      --workers ${GUNICORN_WORKERS:-1}
      --threads ${GUNICORN_THREADS:-4}
      --timeout ${GUNICORN_TIMEOUT:-300}
      embed_server:app
    ports:
      - "${NLP_PORT:-8010}:8080"
    restart: unless-stopped

volumes:
  huggingface_cache:
